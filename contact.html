<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfiniTR // Contact Matrix Connection</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">INFINI<span>TR</span></div>
    
    <div class="nav-links-group">
      <a href="index.html" class="nav-page-link">Dashboard</a>
      <a href="features.html" class="nav-page-link">Features</a>
      <a href="trends.html" class="nav-page-link">Trends</a>
      <a href="contact.html" class="nav-page-link active">Contact</a>
    </div>

    <div class="profile-pill">
      <div class="user-meta-block">
        <span id="user-display-name" class="user-email">guest_account@infinitr.io</span>
        <small id="user-role-sub" style="color: var(--text-muted); display: block; font-size: 0.7rem;"></small>
      </div>
      <span id="portal-role-badge" style="font-size: 0.7rem; font-weight: bold; padding: 0.2rem 0.4rem; background: rgba(255,255,255,0.05); border-radius: 4px; display: none;"></span>
      <button id="logout-btn" class="auth-btn" style="display: none;">Log Out</button>
      <button id="login-trigger-btn" class="login-btn">Log In</button>
    </div>
  </nav>

  <div id="auth-screen" class="auth-container" style="display: none;">
    <div class="auth-card">
      <div class="auth-close" id="auth-close-btn">&times;</div>
      <h2>INFINI<span>TR</span></h2>
      <p>Enter your profile credentials to sync with the tracking matrix stream.</p>
      <form id="login-form">
        <div class="input-group">
          <label for="username">Enter Your Email</label>
          <input type="text" id="username" placeholder="member@infinitr.io" required autocomplete="email">
        </div>
        <div class="input-group">
          <label for="password">Enter Your Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">SUBMIT</button>
        <div id="auth-error" class="error-msg"></div>
      </form>
    </div>
  </div>

  <div class="dashboard-layout" style="grid-template-columns: 1fr; max-width: 800px; margin-top: 4rem;">
    <section class="card-panel" style="padding: 3rem;">
      <h2 class="panel-title" style="font-size: 1.75rem; font-family: var(--font-display); text-align: center; margin-bottom: 0.5rem;">Connect with <span>Telemetry Control</span></h2>
      <p style="color: var(--text-muted); text-align: center; font-size: 0.9rem; margin-bottom: 2.5rem; line-height: 1.5;">Submit an secure communications request packet to our technical operations team.</p>
      
      <form id="contact-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="input-group" style="margin-bottom: 0;">
            <label for="contact-name">User Name</label>
            <input type="text" id="contact-name" placeholder="Enter Name" required style="background: #060913;">
          </div>
          <div class="input-group" style="margin-bottom: 0;">
            <label for="contact-email">Your Email</label>
            <input type="email" id="contact-email" placeholder="name@domain.com" required style="background: #060913;">
          </div>
        </div>
        
        <div class="input-group" style="margin-bottom: 0;">
          <label for="contact-subject">Transmission Classification Subject</label>
          <input type="text" id="contact-subject" placeholder="General telemetry inquiry, tier upgrade link request..." required style="background: #060913;">
        </div>

        <div class="input-group" style="margin-bottom: 0;">
          <label for="contact-message">Secure Message Payload</label>
          <textarea id="contact-message" rows="6" placeholder="Provide complete request details..." required style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-line); background: #060913; color: white; outline: none; font-family: var(--font-body); font-size: 0.9rem; resize: none;"></textarea>
        </div>

        <button type="submit" class="btn-primary" style="padding: 1rem; margin-top: 1rem;">SUBMIT</button>
      </form>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
